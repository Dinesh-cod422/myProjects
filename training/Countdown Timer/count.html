<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="STYLE/style.css">
     
    <!-- bootstrap-icons link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">

    <link rel="icon" href="img/dineshkumar.png">

    <title>CountDown</title>
</head>
<body>
    
    <div class="body">
    <div class="container">
        <h1 class="txt">2022</h1>
        <h2 class="head">CHIRTMAS REMINDER</h2>
        <hr>
        <div class="counter">

            <div class="box">
                <div id="days">00 <span>:</span></div>
                <small>DAYS</small>
            </div>

            <div class="box">
                <div id="hours">00 <span>:</span></div>
                <small>HOURS</small>
            </div>

            <div class="box">
                <div id="minutes">00 <span>:</span></div>
                <small>MINUTES</small>
            </div>

            <div class="box box1">
                <div id="seconds">00 <span>:</span></div>
                <small>SECONDS</small>
            </div>
        
        </div>

        <h4 class="notify">NOTIFY ME WHEN IT'S READY</h4>   
        <form action="#" id="form">
            <div class="form-control">
            <input type="text" id="mail" placeholder="Enter your mail address">
            <small>error message</small>

    </div>

            
           <button>SUBMIT</button>
    </form>
        <footer>
            <h5 class="fttext">We are also here...</h5>
            <div class="fticon">
                <i class="bi bi-facebook"></i>
                <i class="bi bi-twitter"></i>
                <i class="bi bi-instagram"></i>
            </div>
        </footer>
    </div>
</div>
    

    <script src="js/count.js"></script>
</body>
</html>
